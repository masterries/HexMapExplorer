<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HexMap Client-Side</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Turf.js for Geospatial Math -->
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <style>
        #map {
            height: 100vh;
            width: 100%;
        }
    </style>
</head>

<body class="flex h-screen bg-gray-100 overflow-hidden">

    <!-- Sidebar -->
    <div class="w-1/4 min-w-[350px] bg-white shadow-xl z-20 flex flex-col p-6 overflow-y-auto">
        <h1 class="text-2xl font-bold mb-6 text-gray-800">HexMap Client (Cached)</h1>

        <div class="space-y-4">
            <!-- Center Point -->
            <div class="p-4 bg-blue-50 rounded-lg border border-blue-100">
                <label class="block text-sm font-semibold text-gray-700 mb-1">Start Point (Center)</label>
                <div class="flex gap-2">
                    <input type="number" id="center_lat" step="0.0001" class="w-1/2 p-2 border rounded text-sm">
                    <input type="number" id="center_lon" step="0.0001" class="w-1/2 p-2 border rounded text-sm">
                </div>
                <div class="text-xs text-blue-500 mt-1 cursor-pointer hover:underline" onclick="enablePick('center')">📍
                    Click to pick</div>
            </div>

            <!-- Dest Point -->
            <div class="p-4 bg-red-50 rounded-lg border border-red-100">
                <label class="block text-sm font-semibold text-gray-700 mb-1">Destination</label>
                <div class="flex gap-2">
                    <input type="number" id="dest_lat" step="0.0001" class="w-1/2 p-2 border rounded text-sm">
                    <input type="number" id="dest_lon" step="0.0001" class="w-1/2 p-2 border rounded text-sm">
                </div>
                <div class="text-xs text-red-500 mt-1 cursor-pointer hover:underline" onclick="enablePick('dest')">📍
                    Click to pick</div>
            </div>

            <!-- Parameters -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Radius (Hexagons)</label>
                <input type="range" id="radius" min="2" max="15" value="6"
                    class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer">
                <div class="text-right text-xs text-gray-500"><span id="radius_val">6</span> (approx <span
                        id="hex_count">127</span> hexs)</div>
            </div>

            <button onclick="generateGrid()" id="calcBtn"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded transition shadow-lg">
                Generieren
            </button>
            <div id="status_text" class="text-xs text-gray-500 mt-1 text-center h-4"></div>
            <div id="progress" class="hidden w-full bg-gray-200 rounded-full h-2.5 mt-2">
                <div id="progress_bar" class="bg-blue-600 h-2.5 rounded-full" style="width: 0%"></div>
            </div>

            <hr class="border-gray-200 my-2">

            <div class="flex gap-2">
                <input type="text" id="save_name" placeholder="Save Name (Required for PHP)"
                    class="flex-grow p-2 border rounded text-sm">
                <button onclick="saveConfigPHP()"
                    class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded shadow">Save (PHP)</button>
            </div>
        </div>

        <!-- History -->
        <div class="mt-8">
            <h3 class="font-bold text-gray-700 mb-2">PHP Database History</h3>
            <ul id="history_list" class="space-y-2 text-sm text-gray-600">
                <li><button class="text-blue-500 underline" onclick="loadHistoryPHP()">Load History</button></li>
            </ul>
        </div>
    </div>

    <!-- Map Container -->
    <div class="flex-grow relative">
        <div id="map"></div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Init Map
        const map = L.map('map').setView([49.8734, 6.1727], 11);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap, © CartoDB'
        }).addTo(map);

        let geoJsonLayer = L.geoJSON(null).addTo(map);
        let pickMode = null;

        let markers = {
            center: L.marker([49.8734, 6.1727], { draggable: true }).addTo(map),
            dest: L.marker([49.8734, 6.1727], {
                draggable: true, icon: L.icon({
                    iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
                    iconSize: [25, 41],
                    iconAnchor: [12, 41]
                })
            }).addTo(map)
        };

        // Defaults
        document.getElementById('center_lat').value = 49.8734;
        document.getElementById('center_lon').value = 6.1727;
        document.getElementById('dest_lat').value = 49.8734;
        document.getElementById('dest_lon').value = 6.1727;

        document.getElementById('radius').oninput = function () {
            const r = parseInt(this.value);
            document.getElementById('radius_val').innerText = r;
            const count = 3 * r * (r + 1) + 1;
            document.getElementById('hex_count').innerText = count;
        }

        // --- CORE LOGIC ---

        function getColor(d) {
            if (d === null || d === undefined) return 'gray';
            const max = 60;
            const p = Math.min(d / max, 1);
            const r = Math.round(p * 255);
            const g = Math.round((1 - p) * 255);
            return `rgb(${r},${g},0)`;
        }

        function getCacheKey(slat, slon, dlat, dlon) {
            return `${slat.toFixed(6)}_${slon.toFixed(6)}_${dlat.toFixed(6)}_${dlon.toFixed(6)}`;
        }

        // Rate Limited Queue
        class RequestQueue {
            constructor(concurrency = 4) {
                this.concurrency = concurrency;
                this.pending = 0;
                this.queue = [];
            }
            async add(fn) {
                if (this.pending >= this.concurrency) {
                    await new Promise(resolve => this.queue.push(resolve));
                }
                this.pending++;
                try {
                    return await fn();
                } finally {
                    this.pending--;
                    if (this.queue.length > 0) this.queue.shift()();
                }
            }
        }
        const queue = new RequestQueue(5);

        async function fetchOSRM(source, dest) {
            const url = `https://router.project-osrm.org/route/v1/driving/${source[0]},${source[1]};${dest[0]},${dest[1]}?overview=false`;
            try {
                const res = await fetch(url);
                if (res.status !== 200) return null;
                const data = await res.json();
                if (data.routes && data.routes.length > 0) {
                    return data.routes[0].duration / 60.0;
                }
            } catch (e) { console.error(e); }
            return null;
        }

        async function fetchCacheBatch(keys) {
            try {
                const res = await fetch('cache_layer.php', {
                    method: 'POST', body: JSON.stringify({ action: 'get', data: keys })
                });
                return await res.json();
            } catch (e) { console.error("Cache Fetch Error", e); return {}; }
        }

        async function saveCacheBatch(data) {
            try {
                await fetch('cache_layer.php', {
                    method: 'POST', body: JSON.stringify({ action: 'set', data: data })
                });
            } catch (e) { console.error("Cache Save Error", e); }
        }

        async function generateGrid() {
            const center = [parseFloat(document.getElementById('center_lon').value), parseFloat(document.getElementById('center_lat').value)];
            const dest = [parseFloat(document.getElementById('dest_lon').value), parseFloat(document.getElementById('dest_lat').value)];
            // Use fixed precision for cache keys to ensure hits
            const destLat = parseFloat(document.getElementById('dest_lat').value);
            const destLon = parseFloat(document.getElementById('dest_lon').value);

            const radius = parseInt(document.getElementById('radius').value);
            const hexSize = 0.4;

            const btn = document.getElementById('calcBtn');
            const pBar = document.getElementById('progress_bar');
            const statusTxt = document.getElementById('status_text');
            document.getElementById('progress').classList.remove('hidden');
            btn.disabled = true;

            // 1. Generate All Points
            const hexRequests = [];

            function axialToOffset(q, r, size) {
                const x = size * Math.sqrt(3) * (q + r / 2);
                const y = size * 1.5 * r;
                return { x, y };
            }
            function offsetToLatLon(originList, offX, offY) {
                const origin = turf.point(originList);
                const d = Math.sqrt(offX * offX + offY * offY);
                if (d === 0) return originList;
                const bearing = (Math.atan2(offX, offY) * 180 / Math.PI);
                const dest = turf.destination(origin, d, bearing, { units: 'kilometers' });
                return dest.geometry.coordinates;
            }
            function getHexPoly(center, size) {
                const verts = [];
                for (let i = 0; i < 6; i++) {
                    const angle = 60 * i - 30;
                    const rad = angle * Math.PI / 180;
                    const ox = size * Math.cos(rad);
                    const oy = size * Math.sin(rad);
                    verts.push(offsetToLatLon(center, ox, oy));
                }
                verts.push(verts[0]);
                return verts;
            }

            statusTxt.innerText = "Calculating Grid...";
            for (let q = -radius; q <= radius; q++) {
                for (let r = -radius; r <= radius; r++) {
                    if (Math.abs(q) + Math.abs(r) + Math.abs(-q - r) <= radius * 2) {
                        const off = axialToOffset(q, r, hexSize);
                        const hCenter = offsetToLatLon(center, off.x, off.y);
                        // Use lat/lon for key
                        const key = getCacheKey(hCenter[1], hCenter[0], destLat, destLon);
                        hexRequests.push({ q, r, center: hCenter, key: key, time: null });
                    }
                }
            }

            // 2. Check Cache
            statusTxt.innerText = "Checking Cache...";
            const keysToCheck = hexRequests.map(r => r.key);
            // Chunk keys if too many (PHP post limit)
            const cacheData = await fetchCacheBatch(keysToCheck);

            let missingCount = 0;
            hexRequests.forEach(req => {
                if (cacheData[req.key] !== undefined) {
                    req.time = parseFloat(cacheData[req.key]);
                } else {
                    missingCount++;
                }
            });

            console.log(`Cache Hit: ${hexRequests.length - missingCount}, Missing: ${missingCount}`);

            // 3. Clear Map & Draw Cached Items immediately
            if (geoJsonLayer) map.removeLayer(geoJsonLayer);
            geoJsonLayer = L.geoJSON(null, {
                style: f => ({
                    fillColor: getColor(f.properties.driving_time),
                    weight: 1, opacity: 1, color: 'white', fillOpacity: 0.6
                }),
                onEachFeature: (f, l) => l.bindPopup(`Time: ${f.properties.driving_time?.toFixed(1) || 'N/A'} min`)
            }).addTo(map);

            // Add cached items to map now
            hexRequests.filter(r => r.time !== null).forEach(r => {
                const poly = getHexPoly(r.center, hexSize);
                geoJsonLayer.addData({
                    "type": "Feature",
                    "geometry": { "type": "Polygon", "coordinates": [poly] },
                    "properties": { "driving_time": r.time }
                });
            });

            // 4. Fetch Missing
            statusTxt.innerText = `Fetching ${missingCount} from OSRM...`;
            let completed = 0;
            const newCacheData = {}; // For batch saving

            const missingReqs = hexRequests.filter(r => r.time === null);
            for (const req of missingReqs) {
                await queue.add(async () => {
                    const dt = await fetchOSRM(req.center, dest);

                    if (dt !== null) {
                        newCacheData[req.key] = dt;

                        // Add to map live
                        const poly = getHexPoly(req.center, hexSize);
                        geoJsonLayer.addData({
                            "type": "Feature",
                            "geometry": { "type": "Polygon", "coordinates": [poly] },
                            "properties": { "driving_time": dt }
                        });
                    }

                    completed++;
                    pBar.style.width = (completed / missingCount) * 100 + "%";
                    await new Promise(r => setTimeout(r, 20));
                });
            }

            // 5. Save to Cache
            if (Object.keys(newCacheData).length > 0) {
                statusTxt.innerText = "Saving to Cache...";
                await saveCacheBatch(newCacheData);
            }

            statusTxt.innerText = "Done!";
            btn.disabled = false;
            setTimeout(() => { document.getElementById('progress').classList.add('hidden'); }, 2000);
        }

        async function saveConfigPHP() {
            const payload = {
                name: document.getElementById('save_name').value || 'Unnamed',
                center_lat: parseFloat(document.getElementById('center_lat').value),
                center_lon: parseFloat(document.getElementById('center_lon').value),
                dest_lat: parseFloat(document.getElementById('dest_lat').value),
                dest_lon: parseFloat(document.getElementById('dest_lon').value),
                radius: parseInt(document.getElementById('radius').value),
                hex_size: parseFloat(document.getElementById('hex_size').value)
            };
            try {
                const res = await fetch('save_map.php', { method: 'POST', body: JSON.stringify(payload) });
                const json = await res.json();
                if (json.status === 'success') alert("Saved!"); else alert("Error: " + json.message);
            } catch (e) { alert("Network Error"); }
        }

        async function loadHistoryPHP() {
            try {
                const res = await fetch('get_history.php');
                const data = await res.json();
                const list = document.getElementById('history_list');
                list.innerHTML = "";
                data.forEach(item => {
                    const li = document.createElement('li');
                    li.className = "p-2 hover:bg-gray-100 cursor-pointer border rounded flex justify-between";
                    li.innerHTML = `<span>${item.name}</span> <span class="text-xs text-gray-400">${item.created_at}</span>`;
                    li.onclick = () => {
                        document.getElementById('center_lat').value = item.center_lat;
                        document.getElementById('center_lon').value = item.center_lon;
                        document.getElementById('radius').value = item.radius;
                        document.getElementById('radius_val').innerText = item.radius;
                        if (item.hex_size) {
                            document.getElementById('hex_size').value = item.hex_size;
                            document.getElementById('hex_size_val').innerText = item.hex_size;
                        }

                        markers.center.setLatLng([item.center_lat, item.center_lon]);
                    };
                    list.appendChild(li);
                });
            } catch (e) { console.error(e); }
        }

        map.on('click', function (e) {
            if (pickMode) {
                if (pickMode === 'center') {
                    document.getElementById('center_lat').value = e.latlng.lat.toFixed(4);
                    document.getElementById('center_lon').value = e.latlng.lng.toFixed(4);
                    markers.center.setLatLng(e.latlng);
                } else if (pickMode === 'dest') {
                    document.getElementById('dest_lat').value = e.latlng.lat.toFixed(4);
                    document.getElementById('dest_lon').value = e.latlng.lng.toFixed(4);
                    markers.dest.setLatLng(e.latlng);
                }
                pickMode = null;
                map.getContainer().style.cursor = '';
            }
        });

        function enablePick(mode) {
            pickMode = mode;
            map.getContainer().style.cursor = 'crosshair';
        }
    </script>
</body>

</html>
