server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip static assets
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # SPA fallback: serve index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed build assets can be cached aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Reverse proxy the API to the backend service (keeps the /api prefix).
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Optional self-hosted OSRM router. Only used when the SPA is built with
    # VITE_OSRM_URL=/osrm; otherwise OSRM is called directly from the browser.
    # The variable + Docker DNS resolver lets nginx start fine even when no
    # osrm service is present (the default deployment).
    location /osrm/ {
        resolver 127.0.0.11 valid=30s;
        set $osrm_upstream osrm;
        rewrite ^/osrm/(.*)$ /$1 break;
        proxy_pass http://$osrm_upstream:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
